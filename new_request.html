{% extends "base.html" %}
{% block content %}
<div class="card">
<h2>Tạo yêu cầu mua hàng</h2>
<form method="post" class="grid">
  <div><label>Phòng ban</label><input name="department" required></div>
  <div><label>Người yêu cầu</label><input name="requester_name" value="{{ session.get('full_name') }}" required></div>
  <div class="full"><label>Tên vật tư / dịch vụ</label><input name="item_name" required></div>
  <div class="full"><label>Quy cách / mô tả</label><textarea name="specification"></textarea></div>
  <div><label>Số lượng</label><input type="number" step="0.01" min="0.01" name="quantity" required></div>
  <div><label>Đơn vị</label><input name="unit" placeholder="Cái, bộ, kg..." required></div>
  <div><label>Ngân sách dự kiến (VND)</label><input type="number" min="0" name="estimated_budget"></div>
  <div><label>Mức ưu tiên</label>
    <select name="priority"><option>Thấp</option><option>Trung bình</option><option>Cao</option><option>Khẩn cấp</option></select>
  </div>
  <div><label>Ngày cần hàng</label><input type="date" name="required_date"></div>
  <div><label>Nhà cung cấp đề xuất</label><input name="supplier_suggestion"></div>
  <div class="full"><label>Lý do mua / mục đích sử dụng</label><textarea name="reason" required></textarea></div>
  <div class="full"><button type="submit">Gửi yêu cầu</button></div>
</form>
</div>
{% endblock %}
